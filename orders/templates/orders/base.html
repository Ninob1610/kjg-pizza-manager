<!DOCTYPE html>
{% load static %}
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KjG Pizza</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --kjg-primary: #00b6be;
            --kjg-secondary: #006d84;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
        }
        .navbar-kjg {
            background-color: var(--kjg-primary);
        }
        .navbar-kjg .navbar-brand, .navbar-kjg .nav-link {
            color: white;
            font-weight: bold;
        }
        .navbar-brand-logo {
            height: 40px;
            width: auto;
            margin-right: 10px;
        }
        .btn-kjg {
            background-color: var(--kjg-primary);
            color: white;
            border: none;
        }
        .btn-kjg:hover {
            background-color: var(--kjg-secondary);
            color: white;
        }
        .card-header-kjg {
            background-color: var(--kjg-secondary);
            color: white;
        }
        .footer {
            background-color: var(--kjg-secondary);
            color: white;
            padding: 20px 0;
            margin-top: 40px;
        }
        .status-received { color: #dc3545; font-weight: bold; }
        .status-topping { color: #fd7e14; font-weight: bold; }
        .status-ready { color: #198754; font-weight: bold; }
        .status-completed { color: #6c757d; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-kjg mb-4">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <img src="{% static 'kjg-logo.png' %}" alt="KjG Logo" class="navbar-brand-logo">
                <span>KjG Pizza</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="{% url 'customer_order' %}">Bestellen</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'cashier_dashboard' %}">Kasse</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'kitchen_view' %}">Belegen</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'output_view' %}">Ausgabe</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'analytics_view' %}">Auswertung</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container" style="min-height: 80vh;">
        {% block content %}{% endblock %}
    </div>

    <footer class="footer text-center">
        <div class="container">
            <p>&copy; 2026 KjG Heidenfeld - Nino Beck</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
